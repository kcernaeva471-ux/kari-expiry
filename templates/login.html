{% extends "base.html" %}
{% block title %}Вход — Kari{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <img src="{{ url_for('static', filename='logo.svg') }}" alt="Kari" height="48">
                </div>
                <h6 class="text-center text-muted mb-4">Сроки годности</h6>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Магазин</label>
                        <select name="store_number" class="form-select" required>
                            <option value="">Выберите магазин...</option>
                            {% for s in stores %}
                            <option value="{{ s }}">{{ s }}</option>
                            {% endfor %}
                            <option value="admin">Администратор</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Код доступа</label>
                        <input type="text" name="access_code" class="form-control"
                               placeholder="4 цифры" inputmode="numeric" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
